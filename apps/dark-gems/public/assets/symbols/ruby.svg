<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="dg-ruby-core" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff9090" stop-opacity="1"/>
      <stop offset="35%" stop-color="#e01830" stop-opacity="1"/>
      <stop offset="70%" stop-color="#880010" stop-opacity="1"/>
      <stop offset="100%" stop-color="#440008" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="dg-ruby-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2244" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#880010" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dg-ruby-facet-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7080" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#660010" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="dg-ruby-facet-r" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cc0020" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#440008" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="100" cy="108" rx="82" ry="78" fill="url(#dg-ruby-glow)" opacity="0.5"/>

  <!-- Emerald/oval cut ruby — rectangular top with angled corners -->
  <!-- Top face (table) -->
  <polygon points="68,40 132,40 148,56 148,100 132,116 68,116 52,100 52,56" fill="url(#dg-ruby-core)" stroke="#cc0030" stroke-width="1"/>
  <!-- Stepped crown ring 1 -->
  <polygon points="60,32 140,32 154,46 154,110 140,124 60,124 46,110 46,46"
    fill="none" stroke="#ff6070" stroke-width="2" opacity="0.6"/>
  <!-- Crown facets -->
  <polygon points="68,40 132,40 126,50 74,50" fill="#ff8090" stroke="#dd2040" stroke-width="0.5" opacity="0.7"/>
  <!-- Inner table highlight -->
  <polygon points="74,50 126,50 138,62 138,96 126,108 74,108 62,96 62,62" fill="url(#dg-ruby-facet-l)" stroke="#bb0020" stroke-width="0.5" opacity="0.7"/>
  <!-- Pavilion (bottom half - angled) -->
  <polygon points="68,116 132,116 100,180" fill="#660010" stroke="#440008" stroke-width="1"/>
  <!-- Pavilion left facet -->
  <polygon points="52,100 68,116 100,180 52,140" fill="#550008" stroke="#330006" stroke-width="0.5"/>
  <!-- Pavilion right facet -->
  <polygon points="148,100 132,116 100,180 148,140" fill="#440010" stroke="#330006" stroke-width="0.5"/>
  <!-- Pavilion mid-left -->
  <polygon points="68,116 84,116 84,155 100,180" fill="#770012" stroke="#550008" stroke-width="0.5"/>
  <!-- Pavilion mid-right -->
  <polygon points="132,116 116,116 116,155 100,180" fill="#660010" stroke="#440008" stroke-width="0.5"/>

  <!-- Specular -->
  <ellipse cx="86" cy="60" rx="22" ry="8" fill="white" opacity="0.35" transform="rotate(-15 86 60)"/>
  <ellipse cx="78" cy="50" rx="8" ry="4" fill="white" opacity="0.55"/>
  <ellipse cx="95" cy="44" rx="5" ry="2" fill="white" opacity="0.7"/>
</svg>
