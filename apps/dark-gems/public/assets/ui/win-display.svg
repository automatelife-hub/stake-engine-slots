<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="wd-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0830"/>
      <stop offset="50%" stop-color="#0d0420"/>
      <stop offset="100%" stop-color="#08020e"/>
    </linearGradient>
    <linearGradient id="wd-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9040ff"/>
      <stop offset="50%" stop-color="#cc66ff"/>
      <stop offset="100%" stop-color="#5010c0"/>
    </linearGradient>
    <linearGradient id="wd-value" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffd840"/>
      <stop offset="70%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <filter id="wd-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background panel -->
  <rect x="4" y="4" width="392" height="112" rx="12" fill="url(#wd-bg)" stroke="url(#wd-border)" stroke-width="2.5"/>
  <!-- Inner glow border -->
  <rect x="8" y="8" width="384" height="104" rx="9" fill="none" stroke="#7030d0" stroke-width="1" opacity="0.5"/>

  <!-- "WIN" label -->
  <text x="200" y="44" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="22" font-weight="900" letter-spacing="8"
    fill="#cc88ff" filter="url(#wd-glow)">WIN</text>

  <!-- Win value (placeholder - replaced at runtime) -->
  <text x="200" y="96" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="44" font-weight="900" letter-spacing="-1"
    fill="url(#wd-value)" filter="url(#wd-glow)">0.00</text>

  <!-- Corner sparkles -->
  <polygon points="20,20 25,30 20,38 15,30" fill="#cc66ff" opacity="0.7" filter="url(#wd-glow)"/>
  <polygon points="380,20 385,30 380,38 375,30" fill="#cc66ff" opacity="0.7" filter="url(#wd-glow)"/>
</svg>
