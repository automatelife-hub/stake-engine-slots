<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="mb-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3a1060"/>
      <stop offset="60%" stop-color="#1a0830"/>
      <stop offset="100%" stop-color="#08020e"/>
    </radialGradient>
    <linearGradient id="mb-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc40"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="mb-text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffee80"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <filter id="mb-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hexagonal badge shape -->
  <polygon points="50,5 88,27 88,73 50,95 12,73 12,27"
    fill="url(#mb-bg)" stroke="url(#mb-border)" stroke-width="3" filter="url(#mb-glow)"/>
  <polygon points="50,10 83,30 83,70 50,90 17,70 17,30"
    fill="none" stroke="#ffaa20" stroke-width="1" opacity="0.4"/>

  <!-- Multiplier value (placeholder - runtime) -->
  <text x="50" y="56" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="30" font-weight="900"
    fill="url(#mb-text)" filter="url(#mb-glow)">2×</text>

  <!-- Small "MULT" label -->
  <text x="50" y="74" text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="9" letter-spacing="1.5"
    fill="#cc8830" opacity="0.9">MULT</text>
</svg>
