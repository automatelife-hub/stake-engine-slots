<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660">
  <defs>
    <linearGradient id="rf-stone-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1e38"/>
      <stop offset="50%" stop-color="#1a1228"/>
      <stop offset="100%" stop-color="#0d0818"/>
    </linearGradient>
    <linearGradient id="rf-stone-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#221830"/>
      <stop offset="50%" stop-color="#160f22"/>
      <stop offset="100%" stop-color="#0a0610"/>
    </linearGradient>
    <linearGradient id="rf-crystal-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8040ff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#4020cc" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#6030e8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2010a0" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="rf-corner-gem" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc88ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#8020cc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#400070" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="rf-inner-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#180828" stop-opacity="0"/>
      <stop offset="80%" stop-color="#0a0418" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050210" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="rf-crystal-bloom">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ======= OUTER STONE FRAME ======= -->
  <!-- Top beam -->
  <rect x="0" y="0" width="900" height="80" rx="0" fill="url(#rf-stone-top)"/>
  <!-- Bottom beam -->
  <rect x="0" y="580" width="900" height="80" fill="url(#rf-stone-top)"/>
  <!-- Left pillar -->
  <rect x="0" y="0" width="80" height="660" fill="url(#rf-stone-side)"/>
  <!-- Right pillar -->
  <rect x="820" y="0" width="80" height="660" fill="url(#rf-stone-side)"/>

  <!-- Stone bevel / chisel details on pillars -->
  <!-- Left pillar highlight -->
  <rect x="0" y="0" width="4" height="660" fill="#3a2850" opacity="0.6"/>
  <rect x="76" y="0" width="4" height="660" fill="#08040e" opacity="0.7"/>
  <!-- Right pillar -->
  <rect x="820" y="0" width="4" height="660" fill="#08040e" opacity="0.7"/>
  <rect x="896" y="0" width="4" height="660" fill="#3a2850" opacity="0.5"/>
  <!-- Top beam bevel -->
  <rect x="0" y="0" width="900" height="4" fill="#3a2850" opacity="0.6"/>
  <rect x="0" y="76" width="900" height="4" fill="#08040e" opacity="0.7"/>
  <!-- Bottom beam bevel -->
  <rect x="0" y="580" width="900" height="4" fill="#3a2850" opacity="0.5"/>
  <rect x="0" y="656" width="900" height="4" fill="#08040e" opacity="0.6"/>

  <!-- Stone texture - horizontal strata on pillars -->
  <path d="M4,150 L76,150" stroke="#251a35" stroke-width="1" opacity="0.5"/>
  <path d="M4,280 L76,280" stroke="#1e1428" stroke-width="1" opacity="0.45"/>
  <path d="M4,420 L76,420" stroke="#251a35" stroke-width="1" opacity="0.5"/>
  <path d="M4,530 L76,530" stroke="#1e1428" stroke-width="1" opacity="0.4"/>
  <path d="M820,180 L896,180" stroke="#251a35" stroke-width="1" opacity="0.5"/>
  <path d="M820,310 L896,310" stroke="#1e1428" stroke-width="1" opacity="0.45"/>
  <path d="M820,440 L896,440" stroke="#251a35" stroke-width="1" opacity="0.5"/>

  <!-- Gem vein inlays on pillars -->
  <!-- Left pillar veins -->
  <path d="M20,200 C28,195 52,205 68,198" stroke="#2848e0" stroke-width="2" fill="none" opacity="0.6" filter="url(#rf-crystal-bloom)"/>
  <path d="M20,350 C32,344 50,354 68,347" stroke="#8820cc" stroke-width="2" fill="none" opacity="0.55" filter="url(#rf-crystal-bloom)"/>
  <path d="M20,490 C30,484 54,494 68,487" stroke="#009838" stroke-width="2" fill="none" opacity="0.55" filter="url(#rf-crystal-bloom)"/>
  <!-- Right pillar veins -->
  <path d="M820,220 C836,214 860,224 876,217" stroke="#9920cc" stroke-width="2" fill="none" opacity="0.6" filter="url(#rf-crystal-bloom)"/>
  <path d="M820,370 C838,363 862,373 876,366" stroke="#0028e0" stroke-width="2" fill="none" opacity="0.55" filter="url(#rf-crystal-bloom)"/>
  <path d="M820,510 C836,503 858,513 876,506" stroke="#cc0818" stroke-width="2" fill="none" opacity="0.5" filter="url(#rf-crystal-bloom)"/>

  <!-- ======= CRYSTAL INNER BORDER ======= -->
  <!-- This is the glowing edge that borders the reel viewport -->
  <rect x="80" y="80" width="740" height="500"
    fill="none"
    stroke="url(#rf-crystal-border)"
    stroke-width="4"
    filter="url(#rf-crystal-bloom)"/>
  <!-- Secondary inner glow line -->
  <rect x="84" y="84" width="732" height="492"
    fill="none"
    stroke="#6030d0"
    stroke-width="1.5"
    opacity="0.4"/>

  <!-- Reel divider lines (5 reels = 4 dividers) -->
  <!-- Reel width: 740/5 = 148px each, starting at x=80 -->
  <line x1="228" y1="80" x2="228" y2="580" stroke="#3a2060" stroke-width="2" opacity="0.6"/>
  <line x1="228" y1="80" x2="228" y2="580" stroke="#6030b0" stroke-width="0.8" opacity="0.3" filter="url(#rf-crystal-bloom)"/>
  <line x1="376" y1="80" x2="376" y2="580" stroke="#3a2060" stroke-width="2" opacity="0.6"/>
  <line x1="376" y1="80" x2="376" y2="580" stroke="#6030b0" stroke-width="0.8" opacity="0.3" filter="url(#rf-crystal-bloom)"/>
  <line x1="524" y1="80" x2="524" y2="580" stroke="#3a2060" stroke-width="2" opacity="0.6"/>
  <line x1="524" y1="80" x2="524" y2="580" stroke="#6030b0" stroke-width="0.8" opacity="0.3" filter="url(#rf-crystal-bloom)"/>
  <line x1="672" y1="80" x2="672" y2="580" stroke="#3a2060" stroke-width="2" opacity="0.6"/>
  <line x1="672" y1="80" x2="672" y2="580" stroke="#6030b0" stroke-width="0.8" opacity="0.3" filter="url(#rf-crystal-bloom)"/>

  <!-- Row divider lines (3 rows = 2 dividers) -->
  <!-- Row height: 500/3 ≈ 166px each, starting at y=80 -->
  <line x1="80" y1="247" x2="820" y2="247" stroke="#3a2060" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="413" x2="820" y2="413" stroke="#3a2060" stroke-width="1.5" opacity="0.5"/>

  <!-- ======= CORNER GEMS ======= -->
  <!-- TL corner -->
  <polygon points="80,80 96,96 80,112" fill="url(#rf-corner-gem)" filter="url(#rf-crystal-bloom)" opacity="0.9"/>
  <polygon points="80,80 96,80 80,96" fill="#cc88ff" opacity="0.7"/>
  <!-- TR corner -->
  <polygon points="820,80 804,96 820,112" fill="url(#rf-corner-gem)" filter="url(#rf-crystal-bloom)" opacity="0.9"/>
  <polygon points="820,80 804,80 820,96" fill="#cc88ff" opacity="0.7"/>
  <!-- BL corner -->
  <polygon points="80,580 96,564 80,548" fill="url(#rf-corner-gem)" filter="url(#rf-crystal-bloom)" opacity="0.85"/>
  <polygon points="80,580 96,580 80,564" fill="#9060e0" opacity="0.65"/>
  <!-- BR corner -->
  <polygon points="820,580 804,564 820,548" fill="url(#rf-corner-gem)" filter="url(#rf-crystal-bloom)" opacity="0.85"/>
  <polygon points="820,580 804,580 820,564" fill="#9060e0" opacity="0.65"/>

  <!-- Decorative top-center gem cluster -->
  <polygon points="450,8 458,28 450,36 442,28" fill="#b060ff" stroke="#8030e0" stroke-width="1" opacity="0.85" filter="url(#rf-crystal-bloom)"/>
  <polygon points="430,12 438,28 430,35 422,28" fill="#6030c0" stroke="#4010a0" stroke-width="0.8" opacity="0.7"/>
  <polygon points="470,12 478,28 470,35 462,28" fill="#6030c0" stroke="#4010a0" stroke-width="0.8" opacity="0.7"/>

  <!-- Bottom center gem ornament -->
  <polygon points="450,622 458,638 450,646 442,638" fill="#9040d0" stroke="#6020b0" stroke-width="1" opacity="0.8" filter="url(#rf-crystal-bloom)"/>
  <polygon points="432,626 439,638 432,644 425,638" fill="#502090" stroke="#380070" stroke-width="0.8" opacity="0.65"/>
  <polygon points="468,626 475,638 468,644 461,638" fill="#502090" stroke="#380070" stroke-width="0.8" opacity="0.65"/>

  <!-- Inner viewport shadow overlay -->
  <rect x="80" y="80" width="740" height="500" fill="url(#rf-inner-glow)"/>
</svg>
