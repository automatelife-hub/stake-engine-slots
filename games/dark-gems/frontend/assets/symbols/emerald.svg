<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="dg-em-core" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#80ffb0" stop-opacity="1"/>
      <stop offset="30%" stop-color="#00c850" stop-opacity="1"/>
      <stop offset="65%" stop-color="#007830" stop-opacity="1"/>
      <stop offset="100%" stop-color="#003818" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="dg-em-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff70" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#004820" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dg-em-step1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60e890" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#006030" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="dg-em-step2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#004020" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Glow -->
  <ellipse cx="100" cy="100" rx="85" ry="85" fill="url(#dg-em-glow)" opacity="0.45"/>

  <!-- Emerald cut: rectangular with clipped corners, stepped facets -->
  <!-- Outer step (girdle) -->
  <polygon points="62,28 138,28 158,48 158,152 138,172 62,172 42,152 42,48" fill="url(#dg-em-core)" stroke="#00aa44" stroke-width="1.5"/>
  <!-- Step ring 1 -->
  <polygon points="70,38 130,38 148,56 148,144 130,162 70,162 52,144 52,56"
    fill="url(#dg-em-step1)" stroke="#009938" stroke-width="1" opacity="0.75"/>
  <!-- Step ring 2 (inner table) -->
  <polygon points="80,50 120,50 136,66 136,134 120,150 80,150 64,134 64,66"
    fill="url(#dg-em-step2)" stroke="#007828" stroke-width="0.8" opacity="0.8"/>
  <!-- Innermost table -->
  <polygon points="90,62 110,62 122,74 122,126 110,138 90,138 78,126 78,74"
    fill="#00b848" stroke="#009030" stroke-width="0.5" opacity="0.6"/>

  <!-- Corner facets (crown) -->
  <polygon points="62,28 80,50 64,66 42,48" fill="#40c870" stroke="#009030" stroke-width="0.5" opacity="0.7"/>
  <polygon points="138,28 120,50 136,66 158,48" fill="#30b060" stroke="#007828" stroke-width="0.5" opacity="0.7"/>
  <polygon points="62,172 80,150 64,134 42,152" fill="#006028" stroke="#004818" stroke-width="0.5" opacity="0.8"/>
  <polygon points="138,172 120,150 136,134 158,152" fill="#005020" stroke="#003818" stroke-width="0.5" opacity="0.8"/>

  <!-- Top/bottom crown bands -->
  <polygon points="62,28 138,28 120,50 80,50" fill="#70e898" stroke="#30c060" stroke-width="0.5" opacity="0.65"/>
  <polygon points="62,172 138,172 120,150 80,150" fill="#004820" stroke="#003010" stroke-width="0.5" opacity="0.7"/>

  <!-- Specular highlights -->
  <ellipse cx="95" cy="62" rx="18" ry="6" fill="white" opacity="0.4" transform="rotate(-5 95 62)"/>
  <ellipse cx="84" cy="52" rx="7" ry="3" fill="white" opacity="0.6"/>
  <rect x="85" y="44" width="20" height="4" rx="2" fill="white" opacity="0.3"/>
</svg>
